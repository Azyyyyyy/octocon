name: interfold-db
x-log-rotation: &default-log-rotation
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  msg-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: always
    ports:
      - "4200:5432"
    volumes:
      - msg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      octo_network:
        ipv4_address: ${OCTOCON_POSTGRES_IP:-172.30.1.2}

  msg-db-load-schema:
    image: timescale/timescaledb:latest-pg16
    logging: *default-log-rotation
    depends_on:
      msg-db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../csharp/db/postgres/001_create_octocon_idempotency.sql:/schemas/001_create_octocon_idempotency.sql:ro
      - ../csharp/db/postgres/002_create_auth_tokens.sql:/schemas/002_create_auth_tokens.sql:ro
      - ../dev/scylla/scripts/postgres-load-schema.sh:/scripts/postgres-load-schema.sh:ro
    restart: on-failure
    entrypoint:
      [
        "/bin/bash",
        "/scripts/postgres-load-schema.sh",
        "msg-db",
        "octocon",
        "postgres",
        "/schemas/001_create_octocon_idempotency.sql",
        "/schemas/002_create_auth_tokens.sql"
      ]
    networks:
      octo_network:

volumes:
  msg_pgdata: