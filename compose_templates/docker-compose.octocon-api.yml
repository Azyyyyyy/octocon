version: '3.8'

services:
  octocon-api:
    image: octocon-api:latest
    build:
      context: ..
      dockerfile: csharp/Octocon.Api/Dockerfile
    ports:
      - "8081:8080"
    environment:
      # Add any required environment variables here
      ASPNETCORE_ENVIRONMENT: Development
    restart: unless-stopped
