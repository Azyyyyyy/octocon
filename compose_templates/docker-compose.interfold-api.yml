name: interfold-api
x-log-rotation: &default-log-rotation
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  interfold-api:
    image: ghcr.io/azyyyyyy/interfold-api:latest
    user: root
    ports:
      - "80:8080"
      - "443:8081"
    volumes:
      - ${INTERFOLD_APPSETTINGS_SOURCE:-./appsettings.json}:${INTERFOLD_APPSETTINGS_TARGET:-/app/appsettings.json}
      - ${INTERFOLD_CA_PFX_SOURCE:-/opt/octocon/scripts/Interfold SS Root CA.pfx}:${INTERFOLD_CA_PFX_TARGET:-/app/Interfold SS Root CA.pfx}:ro
      - ${INTERFOLD_EC_PRIVATE_KEY_SOURCE:-/opt/octocon/scripts/ec_private.pem}:${INTERFOLD_EC_PRIVATE_KEY_TARGET:-/app/octocon-es256-private.pem}:ro
    logging: *default-log-rotation
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080;https://+:8081}
      OCTOCON_AUTH_EC_PRIVATE_KEY_FILE: ${OCTOCON_AUTH_EC_PRIVATE_KEY_FILE:-${INTERFOLD_EC_PRIVATE_KEY_TARGET:-/app/octocon-es256-private.pem}}
      OCTOCON_SCYLLA_USERNAME: ${OCTOCON_SCYLLA_USERNAME:-cassandra}
      OCTOCON_SCYLLA_PASSWORD: ${OCTOCON_SCYLLA_PASSWORD:-cassandra}
      OCTOCON_REGION: ${OCTOCON_REGION:-nam}
      OCTOCON_POSTGRES_CONNECTION: Host=${OCTOCON_POSTGRES_IP:-172.30.1.2};Port=${OCTOCON_POSTGRES_PORT:-5432};Database=${OCTOCON_POSTGRES_DB:-octocon};Username=${OCTOCON_POSTGRES_USER:-postgres};Password=${OCTOCON_POSTGRES_PASSWORD:?Set OCTOCON_POSTGRES_PASSWORD in compose_templates/.env}
      OCTOCON_SCYLLA_KEYSPACE: ${OCTOCON_SCYLLA_KEYSPACE:-nam}
      OCTOCON_SCYLLA_DATACENTER: ${OCTOCON_SCYLLA_DATACENTER:-nam}
      OCTOCON_SCYLLA_CONTACT_POINTS: ${OCTOCON_SCYLLA_CONTACT_POINTS:-${OCTOCON_SCYLLA_IP:-172.30.1.1}}
      OCTOCON_PERSISTENCE: ${OCTOCON_PERSISTENCE:-scylla-postgres}
      OCTOCON_OTLP_ENDPOINT: ${OCTOCON_OTLP_ENDPOINT:-}
      OCTOCON_AUTH_CHALLENGE_ENABLED: ${OCTOCON_AUTH_CHALLENGE_ENABLED:-true}
      OCTOCON_AUTH_CHALLENGE_GOOGLE_ENDPOINT: ${OCTOCON_AUTH_CHALLENGE_GOOGLE_ENDPOINT:-https://accounts.google.com/o/oauth2/v2/auth}
      OCTOCON_AUTH_CALLBACK_BASE_URL: ${OCTOCON_AUTH_CALLBACK_BASE_URL:-https://api.octocon.app}
      OCTOCON_GOOGLE_OAUTH_CLIENT_ID: ${OCTOCON_GOOGLE_OAUTH_CLIENT_ID:?Set OCTOCON_GOOGLE_OAUTH_CLIENT_ID in compose_templates/.env}
      OCTOCON_GOOGLE_OAUTH_CLIENT_SECRET: ${OCTOCON_GOOGLE_OAUTH_CLIENT_SECRET:?Set OCTOCON_GOOGLE_OAUTH_CLIENT_SECRET in compose_templates/.env}
      OCTOCON_AUTH_CHALLENGE_GOOGLE_PARAMS: ${OCTOCON_AUTH_CHALLENGE_GOOGLE_PARAMS:-client_id=${OCTOCON_GOOGLE_OAUTH_CLIENT_ID},response_type=code,scope=https://www.googleapis.com/auth/userinfo.email}
      OCTOCON_FRONTEND: ${OCTOCON_FRONTEND:-http://localhost:8080/}
      OCTOCON_BETA_FRONTEND: ${OCTOCON_BETA_FRONTEND:-http://localhost:8080/}
      OCTOCON_DEEPLINK_ADDRESS: ${OCTOCON_DEEPLINK_ADDRESS:-https://api.octocon.app/deep}
      OCTOCON_AUTH_CHALLENGE_DISCORD_ENDPOINT: ${OCTOCON_AUTH_CHALLENGE_DISCORD_ENDPOINT:-https://discord.com/api/oauth2/authorize}
      OCTOCON_DISCORD_OAUTH_CLIENT_ID: ${OCTOCON_DISCORD_OAUTH_CLIENT_ID:?Set OCTOCON_DISCORD_OAUTH_CLIENT_ID in compose_templates/.env}
      OCTOCON_DISCORD_OAUTH_CLIENT_SECRET: ${OCTOCON_DISCORD_OAUTH_CLIENT_SECRET:?Set OCTOCON_DISCORD_OAUTH_CLIENT_SECRET in compose_templates/.env}
      OCTOCON_AUTH_CHALLENGE_DISCORD_PARAMS: ${OCTOCON_AUTH_CHALLENGE_DISCORD_PARAMS:-response_type=code,scope=identify}
      OCTOCON_NODE_GROUP: ${OCTOCON_NODE_GROUP:-primary}
      ENCRYPTION_PRIVATE_KEY: ${ENCRYPTION_PRIVATE_KEY:?Set ENCRYPTION_PRIVATE_KEY in compose_templates/.env}
    healthcheck:
      test:
        [
          "CMD",
          "/bin/bash",
          "-lc",
          "exec 3<>/dev/tcp/localhost/8080; printf 'GET /health/database HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'HTTP/1.1 200' <&3"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      octo_network:
    restart: unless-stopped

networks:
  octo_network:
