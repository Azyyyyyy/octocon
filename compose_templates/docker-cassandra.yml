x-log-rotation: &default-log-rotation
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  cassandra:
    entrypoint: ["/enable-mv.sh"]
    image: cassandra:4.1
    ports:
      - "9042:9042"
    restart: always
    environment:
      CASSANDRA_CLUSTER_NAME: OctoCluster

      CASSANDRA_LISTEN_ADDRESS: 172.30.1.1
      CASSANDRA_BROADCAST_ADDRESS: 172.30.1.1
      CASSANDRA_BROADCAST_RPC_ADDRESS: 172.30.1.1

      CASSANDRA_RPC_ADDRESS: 0.0.0.0
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 16

      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 256M

    volumes:
      - ../dev/cassandra/enable-mv.sh:/enable-mv.sh
      - ../dev/scylla/cassandra-rackdc.nam.properties:/etc/cassandra/cassandra-rackdc.properties
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cqlsh 172.30.1.1 -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 20
    logging: *default-log-rotation
    networks:
      octo_network:
        ipv4_address: 172.30.1.1

  msg-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: always
    ports:
      - "4200:5432"
    volumes:
      - ../msg_pgdata:/var/lib/postgresql/data
    networks:
      octo_network:

  msg-db-load-schema:
    image: timescale/timescaledb:latest-pg16
    logging: *default-log-rotation
    depends_on:
      msg-db:
        condition: service_started
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../csharp/db/postgres/001_create_octocon_idempotency.sql:/schemas/001_create_octocon_idempotency.sql:ro
      - ../csharp/db/postgres/002_create_auth_tokens.sql:/schemas/002_create_auth_tokens.sql:ro
      - ../dev/scylla/scripts/postgres-load-schema.sh:/scripts/postgres-load-schema.sh:ro
    restart: on-failure
    entrypoint:
      [
        "/bin/bash",
        "/scripts/postgres-load-schema.sh",
        "msg-db",
        "octocon",
        "postgres",
        "/schemas/001_create_octocon_idempotency.sql",
        "/schemas/002_create_auth_tokens.sql"
      ]
    networks:
      octo_network:

  cassandra-load-keyspaces:
    image: cassandra:4.1
    logging: *default-log-rotation
    depends_on:
      cassandra:
        condition: service_healthy
      msg-db-load-schema:
        condition: service_completed_successfully
    volumes:
      - ../csharp/db/scylla/001_create_octocon_keyspaces.cql:/init.cql
      - ../csharp/db/scylla/001_create_octocon_schema.templated.cql:/schema.cql
      - ../dev/scylla/scripts/scylla-load-keyspaces.sh:/scripts/cassandra-load-keyspaces.sh
    restart: on-failure
    entrypoint: ["/bin/bash", "/scripts/cassandra-load-keyspaces.sh", "172.30.1.1"]
    networks:
      octo_network:

networks:
  octo_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/16

volumes:
  cassandra_data: