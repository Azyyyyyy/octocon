name: CI/CD Pipeline

on:
  push:
    branches: [ csharp-migration ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      DOCKERFILE_PATH: Dockerfile
      BOOTSTRAPPER_DOCKERFILE_PATH: Dockerfile.bootstrapper
      # Single source of truth for buildx target platforms. Adding a platform
      # here also requires: a rid_for entry in the `Tar.gz` step, a per-RID
      # `Upload bootstrapper artifact (...)` step (upload-artifact@v4 is one
      # artifact per invocation), and a TARGETARCH→RID case branch in both
      # /Dockerfile and /Dockerfile.bootstrapper.
      BUILD_PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Required: the Test step runs `dotnet test` on the runner (not in
      # Docker — keeps coverage XML on the runner FS for ReportGenerator and
      # avoids DinD for the Testcontainers-based integration suites). Cache is
      # keyed on csproj + global.json hashes (no packages.lock.json) — every
      # csproj edit busts it, but still cheaper than a cold restore.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      # Required (docker-container driver) for multi-arch manifest output. No
      # QEMU because both Dockerfiles pin the SDK stage to $BUILDPLATFORM and the
      # runtime/output stages have no RUN — add QEMU back if that ever changes.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TUnit's GitHub Actions reporter reads these to attach test results to
      # the run's job summary; they're only exposed to JS actions by default,
      # so this copies them into the job-level env for the Test step (`run:`).
      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      # Parallel per-RID publish in one buildx invocation. Same GHA scope as
      # the API build below so the SDK base image, source-tree COPY layer, and
      # NuGet runtime packs dedup across both Dockerfiles (mode=max exports the
      # `id=nuget` cache mount too).
      - name: Build bootstrapper binaries (multi-RID, parallel)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.BOOTSTRAPPER_DOCKERFILE_PATH }}
          target: out
          platforms: ${{ env.BUILD_PLATFORMS }}
          outputs: type=local,dest=./bootstrap-out
          cache-from: type=gha,scope=interfold-dotnet
          cache-to: type=gha,mode=max,scope=interfold-dotnet

      # tar.gz preserves +x (upload-artifact's zip wrapper would strip it). Also
      # stage linux-x64 at the path BinarySizeGuardrailTests walks up to. The
      # rid_for map is the only place buildx dir names ↔ RIDs are translated.
      - name: Tar.gz binaries + stage linux-x64 for binary-size guardrail
        run: |
          set -euo pipefail
          declare -A rid_for=(
            [linux_amd64]=linux-x64
            [linux_arm64]=linux-arm64
            [linux_arm_v7]=linux-arm
          )
          for buildx_dir in "${!rid_for[@]}"; do
            rid="${rid_for[$buildx_dir]}"
            chmod +x "bootstrap-out/$buildx_dir/interfold-bootstrap"
            tar -czf "interfold-bootstrap-$rid.tar.gz" \
              -C "bootstrap-out/$buildx_dir" interfold-bootstrap
          done
          dest=csharp/Interfold.Bootstrapper/bin/Release/net10.0/linux-x64/publish
          mkdir -p "$dest"
          cp bootstrap-out/linux_amd64/interfold-bootstrap "$dest/interfold-bootstrap"
          chmod +x "$dest/interfold-bootstrap"

      - name: Test
        run: dotnet test --verbosity normal --coverage --coverage-output-format cobertura

      # 7-day retention. Placed after Test so failures abort before upload.
      # One artifact per RID so consumers download only the binary they need;
      # upload-artifact@v4 is one-artifact-per-invocation so this is three steps.
      - name: Upload bootstrapper artifact (linux-x64)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-x64-${{ github.sha }}
          path: interfold-bootstrap-linux-x64.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload bootstrapper artifact (linux-arm)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-arm-${{ github.sha }}
          path: interfold-bootstrap-linux-arm.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload bootstrapper artifact (linux-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-arm64-${{ github.sha }}
          path: interfold-bootstrap-linux-arm64.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Generate code coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/TestResults/*.cobertura.xml'
          targetdir: coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: coveragereport/SummaryGithub.md

      - name: Write to Job Summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/interfold-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      # provenance/sbom off so the manifest list doesn't carry BuildKit's
      # `unknown/unknown` attestation entries (breaks some consumers and the
      # bootstrapper's manifest inspection).
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=interfold-dotnet
          cache-to: type=gha,mode=max,scope=interfold-dotnet
