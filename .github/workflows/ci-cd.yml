name: CI/CD Pipeline

on:
  push:
    branches: [ csharp-migration ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: csharp/Interfold.Api/Interfold.Api.csproj
      DOCKERFILE_PATH: csharp/Interfold.Api/Dockerfile
      IMAGE_NAME: ghcr.io/${{ lower(github.repository_owner) }}/interfold-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./csharp/Interfold.Api/publish

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (from published output)
        run: |
          docker build -f ${{ env.DOCKERFILE_PATH }} -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./csharp/Interfold.Api

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
