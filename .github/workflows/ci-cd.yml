name: CI/CD Pipeline

on:
  push:
    branches: [ csharp-migration ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: csharp/Interfold.Api/Interfold.Api.csproj
      DOCKERFILE_PATH: csharp/Interfold.Api/Dockerfile
    steps:
      - name: Lowercase repository owner & Set image name
        id: lower
        run: |
          # Convert to lowercase using tr
          owner_lower=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          
          # Export as step output
          echo "owner_lower=$owner_lower" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=ghcr.io/$owner_lower/interfold-api" >> $GITHUB_OUTPUT
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
        
      - name: Test
        run: dotnet test --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./csharp/Interfold.Api/publish

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (from published output)
        run: |
          docker build -f ${{ env.DOCKERFILE_PATH }} \
            -t ${{ steps.lower.outputs.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ steps.lower.outputs.IMAGE_NAME }}:latest \
            ./csharp/Interfold.Api

      - name: Push Docker image
        run: |
          docker push ${{ steps.lower.outputs.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ steps.lower.outputs.IMAGE_NAME }}:latest
