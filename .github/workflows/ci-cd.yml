name: CI/CD Pipeline

on:
  push:
    branches: [ csharp-migration ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: csharp/Interfold.Api/Interfold.Api.csproj
      DOCKERFILE_PATH: Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      # Publish the self-contained bootstrapper for linux-x64, linux-arm, and linux-arm64.
      # The linux-x64 output at
      # csharp/Interfold.Bootstrapper/bin/Release/net10.0/linux-x64/publish/interfold-bootstrap
      # also satisfies BinarySizeGuardrailTests.PublishedLinuxX64BinaryIsBelowThreshold so the
      # guardrail executes instead of self-skipping. Each publish output is tar.gz'd to preserve
      # the binary's +x mode bit (which actions/upload-artifact's implicit zip wrapping strips).
      # Uploading is gated on the Test step below so we never publish an artifact for a build
      # whose tests failed.
      - name: Publish bootstrapper (linux-x64, linux-arm, linux-arm64)
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm linux-arm64; do
            dotnet publish csharp/Interfold.Bootstrapper \
              -c Release -r "$rid" /p:PublishProfile="$rid"
            tar -czf "interfold-bootstrap-$rid.tar.gz" \
              -C "csharp/Interfold.Bootstrapper/bin/Release/net10.0/$rid/publish" .
          done

      - name: Test
        run: dotnet test --verbosity normal --coverage --coverage-output-format cobertura

      # Short 7-day retention while release infrastructure (which will build on top of these
      # artifacts) is still being designed. Placed after Test so a failing test run aborts the
      # job before any artifact is uploaded — we never publish a bootstrapper that didn't pass.
      # Three separate uploads so downstream consumers can grab only the RID they need; the
      # ${{ github.sha }} suffix lets multiple runs on the same branch coexist within the
      # retention window.
      - name: Upload bootstrapper artifact (linux-x64)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-x64-${{ github.sha }}
          path: interfold-bootstrap-linux-x64.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload bootstrapper artifact (linux-arm)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-arm-${{ github.sha }}
          path: interfold-bootstrap-linux-arm.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload bootstrapper artifact (linux-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: interfold-bootstrap-linux-arm64-${{ github.sha }}
          path: interfold-bootstrap-linux-arm64.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Generate code coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/TestResults/*.cobertura.xml'
          targetdir: coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: coveragereport/SummaryGithub.md

      - name: Write to Job Summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/interfold-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}