name: CI/CD Pipeline

on:
  push:
    branches: [ csharp-migration ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: csharp/Interfold.Api/Interfold.Api.csproj
      DOCKERFILE_PATH: csharp/Interfold.Api/Dockerfile
    steps:
      - name: Lowercase repository owner & Set image name
        id: lower
        run: |
          # Convert to lowercase using tr
          owner_lower=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          
          # Export as step output
          echo "owner_lower=$owner_lower" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=ghcr.io/$owner_lower/interfold-api" >> $GITHUB_OUTPUT
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
        
      - name: Test
        run: dotnet test --verbosity normal --coverage

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./csharp/Interfold.Api/publish

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/octocon-wasm
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}