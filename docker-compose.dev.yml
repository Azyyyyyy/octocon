x-log-rotation: &default-log-rotation
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  scylla-nam:
    image: scylladb/scylla:2025.1
    ports:
      - "9042:9042"
    restart: always
    command: --seeds=172.18.1.1 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-nam
    volumes:
      - ./dev/scylla/cassandra-rackdc.nam.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_nam_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    networks:
      octo_network:
        ipv4_address: 172.18.1.1

  scylla-eur:
    image: scylladb/scylla:2025.1
    restart: always
    command: --seeds=172.18.1.1,172.18.1.2 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-eur
    volumes:
      - ./dev/scylla/cassandra-rackdc.eur.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_eur_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    depends_on:
      - scylla-nam
    networks:
      octo_network:
        ipv4_address: 172.18.1.2
  
  scylla-sam:
    image: scylladb/scylla:2025.1
    restart: always
    command: --seeds=172.18.1.1,172.18.1.2 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-sam
    volumes:
      - ./dev/scylla/cassandra-rackdc.sam.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_sam_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    depends_on:
      - scylla-nam
      - scylla-eur
    networks:
      octo_network:
        ipv4_address: 172.18.1.3

  scylla-sas:
    image: scylladb/scylla:2025.1
    restart: always
    command: --seeds=172.18.1.1,172.18.1.2 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-sas
    volumes:
      - ./dev/scylla/cassandra-rackdc.sas.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_sas_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    depends_on:
      - scylla-nam
      - scylla-eur
      - scylla-sam
    networks:
      octo_network:
        ipv4_address: 172.18.1.4

  scylla-eas:
    image: scylladb/scylla:2025.1
    restart: always
    command: --seeds=172.18.1.1,172.18.1.2 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-eas
    volumes:
      - ./dev/scylla/cassandra-rackdc.eas.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_eas_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    depends_on:
      - scylla-nam
      - scylla-eur
      - scylla-sam
      - scylla-sas
    networks:
      octo_network:
        ipv4_address: 172.18.1.5

  scylla-ocn:
    image: scylladb/scylla:2025.1
    restart: always
    command: --seeds=172.18.1.1,172.18.1.2 --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1 --api-address 0.0.0.0 --broadcast-address scylla-ocn
    volumes:
      - ./dev/scylla/cassandra-rackdc.ocn.properties:/etc/scylla/cassandra-rackdc.properties
      - scylla_ocn_data:/var/lib/scylla
      - ./dev/scylla/scylla.yaml:/etc/scylla/scylla.yaml
    logging: *default-log-rotation
    depends_on:
      - scylla-nam
      - scylla-eur
      - scylla-sam
      - scylla-sas
      - scylla-eas
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cqlsh --execute='describe keyspaces'"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      octo_network:
        ipv4_address: 172.18.1.6

  scylla-load-keyspaces:
    image: scylladb/scylla:2025.1
    depends_on:
      scylla-ocn:
        condition: service_healthy
    volumes:
      - ./dev/scylla/scripts/init.cql:/init.cql
      - ./csharp/db/scylla/001_create_octocon_schema.cql:/schema.cql
    entrypoint: ["/bin/bash", "-c", "echo Loading Scylla keyspaces... && cqlsh scylla-ocn -f /init.cql && echo Loading canonical Scylla schema... && tail -n +17 /schema.cql > /tmp/schema.tail.cql && cqlsh scylla-ocn -f /tmp/schema.tail.cql"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      octo_network:

  msg-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: always
    ports:
      - "4200:5432"
    volumes:
      - ./msg_pgdata:/var/lib/postgresql/data
    logging: *default-log-rotation
    networks:
      octo_network:

networks:
  octo_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16

volumes:
  scylla_nam_data:
  scylla_eur_data:
  scylla_sam_data:
  scylla_sas_data:
  scylla_eas_data:
  scylla_ocn_data: