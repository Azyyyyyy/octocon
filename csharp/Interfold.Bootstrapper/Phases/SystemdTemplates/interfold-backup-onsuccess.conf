[Unit]
# Chain the update service onto a successful backup. systemd runs OnSuccess= units
# only if the backup exited 0, so a failed backup skips the update — the operator
# still has a chance to intervene before an unattended pull recreates containers
# without a valid rollback snapshot on disk.
#
# Requires systemd >= 249 (Ubuntu 22.04+, Debian 12+, Fedora 35+). The bootstrapper
# refuses to install this drop-in on older systemd; see SystemdInstallPhase.
OnSuccess=interfold-update.service
